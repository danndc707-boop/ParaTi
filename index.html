<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Atardecer - Paisaje</title>
	<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="style.css">
</head>
<body>

<main id="scene">
	<div class="sky"></div>
	<div class="sun"></div>
	<div class="sun-reflection"></div>

	<div class="clouds" aria-hidden="true">
		<div class="cloud c1"></div>
		<div class="cloud c2"></div>
		<div class="cloud c3"></div>
	</div>

	<div class="mountains">
		<div class="mount m1"></div>
		<div class="mount m2"></div>
		<div class="mount m3"></div>
	</div>

	<div class="foreground"></div>

	<!-- Contenedor para las flores que caerán (está detrás del contenido principal) -->
	<div id="falling-flowers" class="falling-flowers" aria-hidden="true"></div>

		<div class="subtitle" id="subtitle" aria-hidden="true">
			<p class="sub-es" id="subEs"></p>
			<p class="sub-en" id="subEn"></p>
		</div>
	
		<div class="author-sign">Sam_Velasquez</div>

		<!-- Texto central grande que aparece en la escena final -->
		<!-- Starfield detrás del texto -->
		<div id="starfield" class="starfield" aria-hidden="true"></div>
		<div id="centerText" class="center-text" aria-hidden="true">DIE FOR YOU</div>
</main>

	<div class="watermark">Sam_Velasquez</div>




	<!-- Botón visible para activar audio y subtítulos -->
	<button id="enableAudioBtn" class="enable-audio-btn">Click</button>

	<!-- Media placeholders: coloca tus archivos en media/bg-music.mp3 y media/bg-video.mp4 -->
	<audio id="bgAudio" src="media/bg-music.mp3" preload="auto" autoplay playsinline muted></audio>
	<video id="bgVideo" src="media/bg-video.mp4" muted loop playsinline preload="auto" class="bg-video"></video>

	<script src="script.js"></script>

</body>
</html>
